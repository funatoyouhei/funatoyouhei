<svg width="280" height="52" viewBox="0 0 280 52" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btn-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#9d4edd"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 外枠グロー -->
  <rect x="1" y="1" width="278" height="50" rx="8" fill="none"
        stroke="url(#border-grad)" stroke-width="1.5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- 背景 -->
  <rect x="3" y="3" width="274" height="46" rx="7" fill="url(#btn-bg)"/>

  <!-- 左のアクセントバー -->
  <rect x="3" y="3" width="4" height="46" rx="2" fill="#a371f7" filter="url(#glow)"/>

  <!-- テキスト -->
  <text x="26" y="21" font-family="'Courier New', monospace" font-size="10"
        fill="#a371f7" opacity="0.9">$ open</text>
  <text x="26" y="38" font-family="'Courier New', monospace" font-size="18"
        font-weight="bold" fill="#ffffff" filter="url(#glow)">Portfolio</text>

  <!-- 右矢印 -->
  <text x="240" y="34" font-family="monospace" font-size="22" fill="#a371f7" filter="url(#glow)">
    ›
    <animate attributeName="x" values="240;248;240" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- コーナーの装飾ドット -->
  <circle cx="260" cy="12" r="2" fill="#58a6ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="268" cy="12" r="2" fill="#a371f7" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="276" cy="12" r="2" fill="#7c3aed" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
