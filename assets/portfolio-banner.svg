<svg width="340" height="80" viewBox="0 0 340 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d1117"/>
      <stop offset="50%"  style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#58a6ff"/>
      <stop offset="50%"  style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <filter id="glow-xl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="340" height="80" rx="10"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- 背景 -->
    <rect width="340" height="80" fill="url(#bg)"/>

    <!-- 流れる光の帯 -->
    <rect x="-340" y="0" width="340" height="80" fill="rgba(124,58,237,0.08)">
      <animate attributeName="x" values="-340;340" dur="2.5s" repeatCount="indefinite"/>
    </rect>

    <!-- 左のネオンバー -->
    <rect x="0" y="0" width="5" height="80" fill="#7c3aed" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- ラベル -->
    <text x="22" y="28" font-family="'Courier New', monospace" font-size="11"
          fill="#58a6ff" filter="url(#glow-sm)">
      $ open --browser
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </text>

    <!-- メインテキスト -->
    <text x="22" y="58" font-family="'Courier New', monospace" font-size="28"
          font-weight="bold" fill="#ffffff" filter="url(#glow-xl)">
      Portfolio
      <animate attributeName="fill" values="#ffffff;#c4b5fd;#ffffff;#93c5fd;#ffffff"
               dur="2.5s" repeatCount="indefinite"/>
    </text>

    <!-- 右矢印群（追いかけるように動く） -->
    <text x="270" y="52" font-family="monospace" font-size="24" fill="#a78bfa" filter="url(#glow-sm)" opacity="0.3">
      ›
      <animate attributeName="x" values="265;278;265" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="0.9s" repeatCount="indefinite"/>
    </text>
    <text x="285" y="52" font-family="monospace" font-size="24" fill="#c4b5fd" filter="url(#glow-sm)" opacity="0.6">
      ›
      <animate attributeName="x" values="281;294;281" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.9s" begin="0.15s" repeatCount="indefinite"/>
    </text>
    <text x="300" y="52" font-family="monospace" font-size="24" fill="#ffffff" filter="url(#glow-xl)" opacity="0.9">
      ›
      <animate attributeName="x" values="297;310;297" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
    </text>

    <!-- 右上のコーナードット -->
    <circle cx="316" cy="16" r="3" fill="#58a6ff" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="326" cy="16" r="3" fill="#a78bfa" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="336" cy="16" r="3" fill="#c4b5fd" filter="url(#glow-sm)">
      <animate attributeName="opacity" values="1;0.1;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 外枠（グロー点滅） -->
  <rect x="1" y="1" width="338" height="78" rx="10" fill="none"
        stroke="url(#border)" stroke-width="1.5">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
